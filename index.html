<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced CSS Portfolio</title>

  <style>
    /* CSS Variables */
    :root {
      --bg-color: #0f172a;
      --card-color: #1e293b;
      --text-color: #ffffff;
      --primary-color: #38bdf8;
      --hover-color: #0ea5e9;
      --border-radius: 12px;
      --transition: 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
    }

    /* BEM Methodology */
    .portfolio {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .portfolio__card {
      background: var(--card-color);
      padding: 20px;
      border-radius: var(--border-radius);
      transition: transform var(--transition),
                  background var(--transition);
    }

    .portfolio__card:hover {
      transform: translateY(-8px);
      background: #334155;
    }

    .portfolio__title {
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .portfolio__text {
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: var(--primary-color);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background var(--transition);
    }

    .btn:hover {
      background: var(--hover-color);
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .portfolio__card {
        padding: 15px;
      }
    }

    /* Advanced Selectors */
    .portfolio__card:nth-child(2) {
      border: 2px solid var(--primary-color);
    }

    .portfolio__card::before {
      content: "★ ";
      color: gold;
    }
  </style>
</head>
<body>

  <h1 style="text-align:center; margin-bottom:30px;">
    Advanced CSS Portfolio
  </h1>

  <section class="portfolio">

    <div class="portfolio__card">
      <h2 class="portfolio__title">CSS Grid</h2>
      <p class="portfolio__text">
        Responsive layouts using modern CSS Grid system.
      </p>
      <a href="#" class="btn">Learn More</a>
    </div>

    <div class="portfolio__card">
      <h2 class="portfolio__title">Flexbox</h2>
      <p class="portfolio__text">
        Flexible alignment and spacing techniques.
      </p>
      <a href="#" class="btn">Learn More</a>
    </div>

    <div class="portfolio__card">
      <h2 class="portfolio__title">Animations</h2>
      <p class="portfolio__text">
        Smooth transitions and hover effects for better UX.
      </p>
      <a href="#" class="btn">Learn More</a>
    </div>

  </section>

</body>
</html>
